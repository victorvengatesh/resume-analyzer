version: '3.8'

# ── Smart Resume Analyzer — Docker Compose ────────────────────────────────────
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up --build

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: talentai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB:       ${POSTGRES_DB:-resume_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-resume_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Do NOT expose 5432 to host in production
    # ports: ["5432:5432"]

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: talentai-backend:latest
    container_name: talentai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-resume_ai}
      SECRET_KEY:         ${SECRET_KEY:?SECRET_KEY must be set in .env}
      GEMINI_API_KEY:     ${GEMINI_API_KEY:-}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_DIR:         /app/uploads
      APP_MODE:           production
      ENABLE_AUTH:        "true"
      ENABLE_USAGE_LIMITS: "true"
      MAX_WORKERS:        "4"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes this at build time — must point to where clients reach the backend
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: talentai-frontend:latest
    container_name: talentai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
