# Render Blueprint for Smart Resume Analyzer Backend
# This file enables one-click deployment to Render
# Visit: https://dashboard.render.com/select-repo?type=blueprint

services:
  # Backend API Service
  - type: web
    name: resume-analyzer-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONPATH
        value: .
      - key: APP_MODE
        value: production
      - key: ENABLE_AUTH
        value: false
      - key: ENABLE_USAGE_LIMITS
        value: true
      - key: ENABLE_ANALYTICS
        value: true
      - key: DATABASE_URL
        value: sqlite:///data/resume_ai.db
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-mztwp8yvz-victorvengateshs-projects.vercel.app
    disk:
      name: resume-data
      mountPath: /data
      sizeGB: 1

# Database will persist in /data directory with the disk mount
