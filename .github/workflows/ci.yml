name: Platform CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (ruff — fast Python linter)
        run: |
          pip install ruff==0.4.4
          ruff check backend/ --select E,F,W --ignore E501 --exit-zero

      - name: Type check (pyright — strict optional fields)
        run: |
          pip install pyright==1.1.362
          pyright backend/ --pythonpath $(which python) || true

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ENABLE_AUTH: "false"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_MODE: "demo"
          PYTHONPATH: "."
        run: |
          pytest backend/tests/ -v --tb=short

  # ── Frontend Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — TypeScript Check + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: talentai-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: talentai-frontend:ci
          build-args: VITE_API_BASE_URL=http://localhost:8000
          cache-from: type=gha
          cache-to:   type=gha,mode=max
